name: Keep Render Warm

# Manual-only fallback. The scheduled cron was removed because GitHub
# Actions free-tier silently drops most scheduled runs under load -
# observed cadence was ~1-2 hours instead of the requested 10 min, so
# Render was spinning down between runs anyway.
#
# Primary keep-warm now runs in an external uptime pinger
# (UptimeRobot / cron-job.org) hitting GET /ping every 5 min.
# Keep this workflow around so we can still fire a manual ping from
# the GitHub UI if the external pinger ever has an outage.

on:
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "ERROR: repo variable BACKEND_URL is not set"
            echo "Set it under Settings -> Secrets and variables -> Actions -> Variables"
            exit 1
          fi

          # Strip any trailing slash so we always hit ${URL}/ping cleanly.
          URL="${BACKEND_URL%/}/ping"
          echo "Pinging $URL"

          # Retry up to 3x with backoff in case Render is mid-cold-start.
          # --max-time 90 covers the worst-case ~50s cold start with margin.
          for attempt in 1 2 3; do
            if curl -fsS --max-time 90 "$URL"; then
              echo
              echo "Ping succeeded on attempt $attempt"
              exit 0
            fi
            echo "Attempt $attempt failed, retrying in 15s..."
            sleep 15
          done

          echo "All 3 attempts failed"
          exit 1
